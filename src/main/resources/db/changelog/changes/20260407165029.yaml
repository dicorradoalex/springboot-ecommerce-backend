databaseChangeLog:
  - changeSet:
      id: 20260407165029
      author: dicorradoalex
      changes:
        # Aggiunta Tabella User
        - createTable:
            tableName: user
            columns:
              - column:
                  name: id
                  type: BINARY(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
              - column:
                  name: surname
                  type: VARCHAR(255)
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: address
                  type: VARCHAR(255)
              - column:
                  name: city
                  type: VARCHAR(255)
              - column:
                  name: country
                  type: VARCHAR(255)

        # Aggiunta Tabella Orders (con la "s", perché senza dà problemi)
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: BINARY(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BINARY(16)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_order_user
                    referencedTableName: user
                    referencedColumnNames: id
              - column:
                  name: status
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: order_time
                  type: DATETIME
                  constraints:
                    nullable: false

        # Aggiunta Tabella OrderEntry
        - createTable:
            tableName: order_entry
            columns:
              - column:
                  name: id
                  type: BINARY(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: BINARY(16)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_entry_order
                    referencedTableName: orders
                    referencedColumnNames: id
              - column:
                  name: product_id
                  type: BINARY(16)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_entry_product
                    referencedTableName: product
                    referencedColumnNames: id
              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: DECIMAL(19, 2)
                  constraints:
                    nullable: false