databaseChangeLog:

# Crea tabella per CartItemEntity
  - changeSet:
      id: 20260419103459
      author: dicorradoalex
      changes:
        - createTable:
            tableName: cart_items
            columns:
              - column:
                  name: id
                  type: BINARY(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: cart_id
                  type: BINARY(16)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cart_item_cart
                    referencedTableName: carts
                    referencedColumnNames: id
              - column:
                  name: product_id
                  type: BINARY(16)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cart_item_product
                    referencedTableName: products
                    referencedColumnNames: id
              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false