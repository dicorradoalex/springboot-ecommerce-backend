databaseChangeLog:
  - changeSet:
      id: create-table-order-entry
      author: academy2026
      changes:
        - createTable:
            tableName: order_entry
            columns:
              - column:
                  name: id
                  type: BINARY(16)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: BINARY(16)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_entry_order
                    referencedTableName: orders
                    referencedColumnNames: id
              - column:
                  name: product_id
                  type: BINARY(16)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_entry_product
                    referencedTableName: product
                    referencedColumnNames: id
              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: DECIMAL(10, 2)
                  constraints:
                    nullable: false
